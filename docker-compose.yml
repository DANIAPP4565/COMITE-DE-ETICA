services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cei_nexus
      POSTGRES_USER: cei_owner
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD:?Ejecute python scripts/generate_env.py}
      CEI_APP_DB_PASSWORD: ${CEI_APP_DB_PASSWORD:?Ejecute python scripts/generate_env.py}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/postgres/01-create-runtime-role.sh:/docker-entrypoint-initdb.d/01-create-runtime-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cei_owner -d cei_nexus"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Ejecute python scripts/generate_env.py}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Ejecute python scripts/generate_env.py}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_APP_ACCESS_KEY: ${S3_APP_ACCESS_KEY}
      S3_APP_SECRET_KEY: ${S3_APP_SECRET_KEY}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set cei http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 2; done
        mc mb --ignore-existing --with-lock cei/cei-documents
        mc version enable cei/cei-documents
        mc anonymous set none cei/cei-documents
        cat > /tmp/cei-policy.json <<'EOF'
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:ListBucket", "s3:GetBucketLocation", "s3:GetBucketVersioning", "s3:PutBucketVersioning"],
              "Resource": ["arn:aws:s3:::cei-documents"]
            },
            {
              "Effect": "Allow",
              "Action": [
                "s3:PutObject", "s3:GetObject", "s3:GetObjectVersion",
                "s3:GetObjectRetention", "s3:PutObjectRetention",
                "s3:GetObjectLegalHold", "s3:PutObjectLegalHold"
              ],
              "Resource": ["arn:aws:s3:::cei-documents/*"]
            }
          ]
        }
        EOF
        mc admin user add cei "$${S3_APP_ACCESS_KEY}" "$${S3_APP_SECRET_KEY}" || true
        mc admin policy create cei cei-app-policy /tmp/cei-policy.json || true
        mc admin policy attach cei cei-app-policy --user "$${S3_APP_ACCESS_KEY}"

  migrate:
    build: .
    command: ["python", "scripts/migrate.py"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_ADMIN_URL: postgresql://cei_owner:${POSTGRES_OWNER_PASSWORD}@postgres:5432/cei_nexus
      DATABASE_URL: postgresql://cei_owner:${POSTGRES_OWNER_PASSWORD}@postgres:5432/cei_nexus
      DATABASE_RUNTIME_ROLE: cei_app
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      RECOVERY_CODE_PEPPER: ${RECOVERY_CODE_PEPPER}

  cei-nexus:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://cei_app:${CEI_APP_DB_PASSWORD}@postgres:5432/cei_nexus
      AUTO_MIGRATE: "false"
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: cei-documents
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${S3_APP_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${S3_APP_SECRET_KEY}
      S3_VERIFY_TLS: "false"
      S3_OBJECT_LOCK_ENABLED: "true"
      S3_OBJECT_LOCK_MODE: GOVERNANCE
      S3_DEFAULT_RETENTION_DAYS: "3650"
      DOCUMENT_MASTER_KEY_B64: ${DOCUMENT_MASTER_KEY_B64}
      DOCUMENT_KEY_ID: document-master-v1
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      RECOVERY_CODE_PEPPER: ${RECOVERY_CODE_PEPPER}
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
